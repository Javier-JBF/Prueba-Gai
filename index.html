<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS Wallpaper</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="bg1" class="dynamic-bg active"></div>
  <div id="bg2" class="dynamic-bg"></div>

  <div class="main-frame">

    <div class="topbar">
      <div class="logo-container">
        <img src="assets/images/others/vbsIconLogo.png" class="logo-icon" alt="logo">
        <img src="assets/images/others/vbsLetterLogo.png" class="logo-text" alt="logo">
      </div>
      <div class="clock-box">
        <div class="clock-line">
          <span id="clockTime" class="clock-time"></span>
          <span id="clockSuffix" class="clock-suffix"></span>
        </div>
        <div class="date" id="date"></div>
      </div>
    </div>

    <div class="panel lyrics" id="lyricsPanelContainer">

      <div class="panel-title">Lyrics</div>

      <div class="lyrics-lang-row" id="lyricsLangRow">
        <button class="lang-btn" data-lang="k">漢字</button>
        <button class="lang-btn active" data-lang="r">Romaji</button>
        <button class="lang-btn" data-lang="e">English</button>
      </div>
      
      <div id="lyricsPanel"></div>
    </div>

    <div class="center">
      <img class="cover" id="cover" src="assets/images/default.jpg" alt="cover">
      <h2 id="songTitle">Song title</h2>
      <h3 id="bandName">Vivid BAD SQUAD</h3>
    </div>
    
    <div class="panel playlist-container">
      
      <div class="panel-title">Playlist</div>
      <div class="playlist-tabs" id="playlistTabs"></div>
      <div class="playlist" id="playlistPanel"></div>
    
    </div>

    <div class="bottom">
      <audio id="audio"></audio>

      <div class="progress-container">
        <span id="currentTime">0:00</span>
        <div class="progress-wrapper">
          <div class="progress-fill" id="progressFill"></div>
          <input type="range" id="progress" min="0" max="100" value="0">
        </div>
        <span id="totalTime">0:00</span>
      </div>

      <div class="controls-row">
        <button id="karaokeBtn"><i class="fa-brands fa-itunes-note"></i></button>
        <button id="favBtn"><i class="fa-solid fa-heart"></i></button>
        <button id="repeatBtn"><i class="fa-solid fa-repeat"></i></button>
        <button id="prevBtn"><i class="fa-solid fa-angles-left"></i></button>
        <button id="playBtn"><i class="fa-solid fa-play"></i></button>
        <button id="nextBtn"><i class="fa-solid fa-angles-right"></i></button>
        <button id="shuffleBtn"><i class="fa-solid fa-shuffle"></i></button>

        <div class="volume-wrapper">
          <div class="volume-expand">
            <button id="volumeBtn"><i class="fa-solid fa-volume-high"></i></button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
